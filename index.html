<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Model Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; overflow: hidden; height: 100vh; width: 100vw; }
    canvas { display: block; }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      z-index: 10;
      gap: 16px;
      color: #555;
      font-family: monospace;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 2px solid #1a1a1a;
      border-top-color: #00ff50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <span>Loading Model...</span>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // SCENE
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d0d0d);

    // CAMERA
    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.01,
      100
    );
    camera.position.set(0, 1.5, 3.5);

    // RENDERER
    const renderer = new THREE.WebGLRenderer({ antialias: true }); // antialias off = faster
renderer.setPixelRatio(1); // don't scale for retina = much faster
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ORBIT CONTROLS
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance   = 1;
    controls.maxDistance   = 8;
    controls.maxPolarAngle = Math.PI / 1.8;

    // LIGHTS
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(3, 5, 4);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.4);
    fillLight.position.set(-4, 2, -2);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0x00ff80, 0.2);
    rimLight.position.set(0, -2, -4);
    scene.add(rimLight);

    // LOAD MODEL
    const loader = new GLTFLoader();

    loader.load(
      'calc1.glb',    // ← your file name here

      (gltf) => {
        const model = gltf.scene;

        // auto scale and center
        const box    = new THREE.Box3().setFromObject(model);
        const size   = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);

        model.scale.setScalar(2 / maxDim);
        model.position.sub(center.multiplyScalar(2 / maxDim));

        model.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow    = true;
            obj.receiveShadow = true;
          }
        });

        scene.add(model);
        document.getElementById('loading').style.display = 'none';
      },

      (xhr) => {
        const pct = Math.round((xhr.loaded / xhr.total) * 100);
        document.querySelector('#loading span').textContent = `Loading... ${pct}%`;
      },

      (err) => {
        console.error(err);
        document.querySelector('#loading span').textContent =
          '⚠ Could not load model — check filename and path';
      }
    );

    // RESIZE
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // RENDER LOOP
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

  </script>
</body>
</html>
